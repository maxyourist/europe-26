];

// Migrate old-format pack data (flat array) into new shape with wardrobe.
function normalizePerson(p) {
  if (Array.isArray(p)) return { categories: p, wardrobe: clone(WARDROBE_DEFAULTS) };
  return {
    categories: p.categories ?? clone(DEFAULT_PACK),
    wardrobe:   p.wardrobe   ?? clone(WARDROBE_DEFAULTS),
  };
}
function clone(x) { return JSON.parse(JSON.stringify(x)); }

function loadPack() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      return {
        carly: normalizePerson(parsed.carly ?? clone(DEFAULT_PACK)),
        max:   normalizePerson(parsed.max   ?? clone(DEFAULT_PACK)),
      };
    }
  } catch {}
  return {
    carly: { categories: clone(DEFAULT_PACK), wardrobe: clone(WARDROBE_DEFAULTS) },
    max:   { categories: clone(DEFAULT_PACK), wardrobe: clone(WARDROBE_DEFAULTS) },
  };
}

// ── Carly's wardrobe breakdown ──────────────────────────────
// Travel days are auto-computed from the schedule (a day with 2+ transit events
// — flight/drive/ferry — counts as a travel day). Nice-night status is
// editable and persisted to localStorage so Carly can refine her best guess
// before packing.
const NICE_KEY = 'europe26-nice-v2';
const DEFAULT_NICE = { 3: 'Siena dinner', 9: 'Paris dinner' };

function isTravelDay(day) {
  const transit = (day.events || []).filter(e =>
    e.kind === 'flight' || e.kind === 'drive' || e.kind === 'ferry'
  );
  return transit.length >= 2;
}
function loadNice() {
  try {
    const raw = localStorage.getItem(NICE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { ...DEFAULT_NICE };
}

function WardrobeBreakdown({ palette }) {
  const days = window.TRIP.days;
  const [niceMap, setNiceMap] = React.useState(loadNice);
  const [editingIdx, setEditingIdx] = React.useState(null);
  const [draft, setDraft] = React.useState('');
  const draftRef = React.useRef(null);
  React.useEffect(() => { if (editingIdx != null && draftRef.current) draftRef.current.focus(); }, [editingIdx]);
  React.useEffect(() => {
    try { localStorage.setItem(NICE_KEY, JSON.stringify(niceMap)); } catch {}
  }, [niceMap]);

  const travelSet = React.useMemo(() => new Set(
    days.map((d, i) => isTravelDay(d) ? i : -1).filter(i => i >= 0)
  ), [days]);

  const niceIdxs = Object.keys(niceMap).map(k => parseInt(k, 10)).sort((a,b) => a-b);
  const travelCount = travelSet.size;
  const niceCount = niceIdxs.length;
  // Casual = days that aren't travel
  const casualCount = days.length - travelCount;

  const toggleNice = (idx) => {
    setNiceMap(m => {
      if (m[idx] != null) {
        const next = { ...m }; delete next[idx]; return next;
      }
      return { ...m, [idx]: 'Dinner' };
    });
  };
  const startRename = (idx) => {
    setEditingIdx(idx); setDraft(niceMap[idx] || '');
  };
  const commitRename = () => {
    if (editingIdx != null) {
      const label = (draft.trim() || 'Dinner');
      setNiceMap(m => ({ ...m, [editingIdx]: label }));
      setEditingIdx(null); setDraft('');
    }
  };
  const remove = (idx) => {
    setNiceMap(m => { const n = { ...m }; delete n[idx]; return n; });
    if (editingIdx === idx) setEditingIdx(null);
  };

  return (
    <div style={{
      marginBottom: 24,
      padding: '14px 14px 16px',
      borderRadius: 14,
      background: `${palette.accent}08`,
      border: `1px solid ${palette.accent}22`,
    }}>
      <div style={{
        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
        marginBottom: 6,
      }}>
        <div style={{
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 9, letterSpacing: '0.2em', textTransform: 'uppercase',
          color: palette.sub,
        }}>Trip mix · for Carly</div>
        <div style={{
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 9, letterSpacing: '0.16em',
          color: palette.sub,
        }}>{days.length} days</div>
      </div>

      <div style={{
        display: 'flex', alignItems: 'baseline', gap: 10, marginTop: 2,
      }}>
        <div style={{
          fontFamily: '"Instrument Serif", Georgia, serif',
          fontStyle: 'italic', fontSize: 38, color: palette.text, lineHeight: 1,
        }}>{niceCount}</div>
        <div style={{
          fontFamily: 'Inter, system-ui, sans-serif',
          fontSize: 12, color: palette.sub, lineHeight: 1.3,
        }}>nice {niceCount === 1 ? 'outfit' : 'outfits'}<br/>needed for dinner</div>
      </div>

      {/* day strip — tap to toggle nice */}
      <div style={{ marginTop: 14 }}>
        <div style={{ display: 'flex', gap: 4, alignItems: 'flex-end' }}>
          {days.map((d, i) => {
            const isTravel = travelSet.has(i);
            const isNice = niceMap[i] != null;
            const date = new Date(d.date + 'T00:00').getDate();
            return (
              <button key={i}
                onClick={() => toggleNice(i)}
                title={isNice ? 'Tap to remove nice night' : 'Tap to mark nice night'}
                style={{
                  flex: 1, display: 'flex', flexDirection: 'column',
                  alignItems: 'center', gap: 4,
                  background: 'transparent', border: 'none',
                  padding: 0, cursor: 'pointer',
                }}>
                <div style={{
                  width: '100%',
                  height: isNice ? 28 : isTravel ? 14 : 22,
                  borderRadius: 4,
                  background: isNice ? palette.accent
                              : isTravel ? palette.sub
                              : palette.text,
                  opacity: isNice ? 1 : isTravel ? 1 : 0.7,
                  border: isNice ? `1px solid ${palette.accent}` : 'none',
                  position: 'relative',
                  transition: 'all 180ms ease',
                }}>
                  {isNice && (
                    <div style={{
                      position: 'absolute', top: -1, right: -1,
                      width: 5, height: 5, borderRadius: 999,
                      background: palette.accent,
                      boxShadow: `0 0 0 1.5px ${palette.ink}`,
                    }}/>
                  )}
                </div>
                <div style={{
                  fontFamily: '"Geist Mono", ui-monospace, monospace',
                  fontSize: 8, color: palette.sub, letterSpacing: '0.02em',
                }}>{date}</div>
              </button>
            );
          })}
        </div>
        <div style={{
          marginTop: 6,
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 8, letterSpacing: '0.14em', textTransform: 'uppercase',
          color: palette.sub, opacity: 0.7,
        }}>Tap a day to mark a nice night</div>
      </div>

      <div style={{
        marginTop: 14, display: 'flex', gap: 14, flexWrap: 'wrap',
        fontFamily: '"Geist Mono", ui-monospace, monospace',
        fontSize: 9, letterSpacing: '0.12em', textTransform: 'uppercase',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
          <div style={{ width: 10, height: 6, borderRadius: 2, background: palette.sub }}/>
          <span style={{ color: palette.sub }}>Travel · {travelCount}d</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
          <div style={{ width: 10, height: 10, borderRadius: 2, background: palette.text, opacity: 0.7 }}/>
          <span style={{ color: palette.sub }}>Casual · {casualCount}d</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
          <div style={{ width: 10, height: 12, borderRadius: 2, background: palette.accent, border: `1px solid ${palette.accent}` }}/>
          <span style={{ color: palette.sub }}>Dressy · {niceCount}</span>
        </div>
      </div>

      {/* editable dinners list */}
      <div style={{
        marginTop: 12, paddingTop: 12,
        borderTop: `1px solid ${palette.accent}22`,
      }}>
        <div style={{
          display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
          marginBottom: 6,
        }}>
          <div style={{
            fontFamily: '"Geist Mono", ui-monospace, monospace',
            fontSize: 8, letterSpacing: '0.2em', textTransform: 'uppercase',
            color: palette.sub,
          }}>Dinners to dress for</div>
          {niceCount > 0 && (
            <div style={{
              fontFamily: '"Geist Mono", ui-monospace, monospace',
              fontSize: 8, letterSpacing: '0.14em',
              color: palette.sub, opacity: 0.7,
            }}>Tap label to rename</div>
          )}
        </div>
        {niceCount === 0 ? (
          <div style={{
            fontFamily: 'Inter, system-ui, sans-serif',
            fontSize: 12, color: palette.sub, fontStyle: 'italic',
          }}>No nice nights yet — tap a day above to add one.</div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {niceIdxs.map((idx) => {
              const date = new Date(days[idx].date + 'T00:00');
              const dateLabel = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
              const isEditing = editingIdx === idx;
              return (
                <div key={idx} style={{
                  display: 'flex', alignItems: 'center', gap: 8,
                  padding: '4px 0',
                }}>
                  <div style={{
                    width: 4, height: 4, borderRadius: 999,
                    background: palette.accent, flexShrink: 0,
                  }}/>
                  {isEditing ? (
                    <input
                      ref={draftRef}
                      value={draft}
                      onChange={(e) => setDraft(e.target.value)}
                      onBlur={commitRename}
                      onKeyDown={(e) => {
                        if (e.key === 'Enter') commitRename();
                        if (e.key === 'Escape') { setEditingIdx(null); setDraft(''); }
                      }}
                      style={{
                        flex: 1, padding: '2px 6px',
                        background: `${palette.accent}10`,
                        border: `1px solid ${palette.accent}55`,
                        borderRadius: 6, outline: 'none',
                        color: palette.text,
                        fontFamily: '"Instrument Serif", Georgia, serif',
                        fontStyle: 'italic', fontSize: 16,
                      }}/>
                  ) : (
                    <button onClick={() => startRename(idx)} style={{
                      flex: 1, textAlign: 'left',
                      background: 'transparent', border: 'none', cursor: 'text',
                      padding: 0,
                      fontFamily: '"Instrument Serif", Georgia, serif',
                      fontStyle: 'italic', fontSize: 17, color: palette.text,
                      lineHeight: 1.2, whiteSpace: 'nowrap',
                      overflow: 'hidden', textOverflow: 'ellipsis',
                    }}>{niceMap[idx]}</button>
                  )}
                  <div style={{
                    fontFamily: '"Geist Mono", ui-monospace, monospace',
                    fontSize: 9, letterSpacing: '0.12em',
                    color: palette.sub, flexShrink: 0,
                  }}>{dateLabel}</div>
                  <button onClick={() => remove(idx)} style={{
                    width: 22, height: 22, borderRadius: 999,
                    background: 'transparent', border: 'none', cursor: 'pointer',
                    color: palette.sub, opacity: 0.55,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    padding: 0, flexShrink: 0,
                  }} title="Remove">
                    <svg width="11" height="11" viewBox="0 0 12 12">
                      <path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
                    </svg>
                  </button>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function PackView({ palette }) {
  const [person, setPerson] = React.useState('carly');
  const [pack, setPack] = React.useState(loadPack);
  // persist + sync
  React.useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(pack)); } catch {}
    window.SyncEngine.pushDebounced({ pack });
  }, [pack]);

  // editing state — null or { cat, idx } for the item being renamed
  const [editing, setEditing] = React.useState(null);
  const [draft, setDraft] = React.useState('');
  const draftRef = React.useRef(null);
  React.useEffect(() => { if (editing && draftRef.current) draftRef.current.focus(); }, [editing]);

  const list = pack[person].categories;
  const wardrobe = pack[person].wardrobe;
  const total = list.reduce((a, c) => a + c.items.length, 0);
  const done  = list.reduce((a, c) => a + c.items.filter(i => i.checked).length, 0);
  const pct   = total ? Math.round(done / total * 100) : 0;
  const totalClothes = wardrobe.reduce((a, w) => a + w.count, 0);

  const mutate = (mutator) => {
    setPack(p => {
      const next = JSON.parse(JSON.stringify(p));
      mutator(next[person].categories);
      return next;
    });
  };
  const mutateWardrobe = (mutator) => {
    setPack(p => {
      const next = JSON.parse(JSON.stringify(p));
      mutator(next[person].wardrobe);
      return next;
    });
  };
  const bumpWardrobe = (id, delta) => mutateWardrobe(w => {
    const it = w.find(x => x.id === id);
    if (it) it.count = Math.max(0, it.count + delta);
  });

  const toggle  = (ci, ii) => mutate(l => { l[ci].items[ii].checked = !l[ci].items[ii].checked; });
  const remove  = (ci, ii) => mutate(l => { l[ci].items.splice(ii, 1); });
  const rename  = (ci, ii, name) => mutate(l => { l[ci].items[ii].name = name; });
  const addItem = (ci) => mutate(l => { l[ci].items.push({ name: 'New item', checked: false }); });
  const resetAll = () => {
    if (confirm('Reset ' + person.charAt(0).toUpperCase() + person.slice(1) + "'s list to default?")) {
      setPack(p => ({ ...p, [person]: {
        categories: JSON.parse(JSON.stringify(DEFAULT_PACK)),
        wardrobe:   JSON.parse(JSON.stringify(WARDROBE_DEFAULTS)),
      }}));
    }
  };

  const commitEdit = () => {
    if (editing) {
      const name = draft.trim() || 'Untitled';
      rename(editing.ci, editing.ii, name);
      setEditing(null); setDraft('');
    }
  };

  return (
    <div style={{ background: palette.ink, transition: 'background 600ms ease', padding: 'calc(72px + env(safe-area-inset-top)) 24px 24px' }}>
      <div style={{
        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
      }}>
        <div style={{
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 10, letterSpacing: '0.2em', textTransform: 'uppercase',
          color: palette.sub,
        }}>Pack</div>
        <button onClick={resetAll} style={{
          background: 'transparent', border: 'none', cursor: 'pointer',
          color: palette.sub,
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 9, letterSpacing: '0.18em', textTransform: 'uppercase',
        }}>Reset</button>
      </div>

      {/* person toggle */}
      <div style={{
        marginTop: 14, display: 'flex',
        background: `${palette.accent}10`,
        border: `1px solid ${palette.accent}22`,
        borderRadius: 999, padding: 4,
      }}>
        {['carly', 'max'].map(p => {
          const active = person === p;
          const cats = pack[p].categories;
          const tot = cats.reduce((a, c) => a + c.items.length, 0);
          const dn = cats.reduce((a, c) => a + c.items.filter(i => i.checked).length, 0);
          return (
            <button key={p}
              onClick={() => { setEditing(null); setPerson(p); }}
              style={{
                flex: 1, padding: '10px 14px', borderRadius: 999,
                border: 'none', cursor: 'pointer',
                background: active ? palette.accent : 'transparent',
                color: active ? palette.ink : palette.text,
                transition: 'all 200ms ease',
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              }}>
              <span style={{
                fontFamily: '"Instrument Serif", Georgia, serif',
                fontStyle: 'italic', fontSize: 18, lineHeight: 1,
              }}>{p === 'carly' ? 'Carly' : 'Max'}</span>
              <span style={{
                fontFamily: '"Geist Mono", ui-monospace, monospace',
                fontSize: 9, letterSpacing: '0.1em',
                opacity: active ? 0.7 : 0.55,
              }}>{dn}/{tot}</span>
            </button>
          );
        })}
      </div>

      {/* progress */}
      <div style={{
        marginTop: 22,
        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
      }}>
        <div style={{
          fontFamily: '"Instrument Serif", Georgia, serif',
          fontStyle: 'italic', fontSize: 36, color: palette.text, lineHeight: 1,
          whiteSpace: 'nowrap', flexShrink: 0,
        }}>{done} <span style={{ color: palette.sub }}>/ {total}</span></div>
        <div style={{
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 10, color: palette.sub, letterSpacing: '0.16em',
        }}>{pct}% READY</div>
      </div>
      <div style={{
        marginTop: 10,
        height: 3, background: `${palette.accent}22`, borderRadius: 2, overflow: 'hidden',
        marginBottom: 24,
      }}>
        <div style={{
          width: `${pct}%`, height: '100%',
          background: palette.accent, transition: 'width 240ms ease',
        }}/>
      </div>

      {person === 'carly' && <WardrobeBreakdown palette={palette}/>}

      {/* Wardrobe counter — how many of each item to bring */}
      <div style={{ marginBottom: 26 }}>
        <div style={{
          display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
          marginBottom: 10,
        }}>
          <div style={{
            fontFamily: '"Geist Mono", ui-monospace, monospace',
            fontSize: 9, letterSpacing: '0.2em', textTransform: 'uppercase',
            color: palette.sub,
          }}>Clothes count</div>
          <div style={{
            fontFamily: '"Geist Mono", ui-monospace, monospace',
            fontSize: 9, letterSpacing: '0.18em', textTransform: 'uppercase',
            color: palette.sub,
          }}>{totalClothes} pcs · {TRIP_DAYS}d</div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          {wardrobe.map((w) => {
            const coverage = w.count / TRIP_DAYS;
            let tag = null;
            if (w.id === 'underwear' || w.id === 'socks' || w.id === 'shirts') {
              if (coverage >= 1) tag = 'DAILY';
              else if (coverage >= 0.6) tag = `${w.count}/${TRIP_DAYS}D`;
              else tag = 'LIGHT';
            }
            return (
              <div key={w.id} style={{
                display: 'flex', alignItems: 'center', gap: 8,
                padding: '6px 10px 7px',
                borderRadius: 10,
                background: `${palette.accent}07`,
                border: `1px solid ${palette.accent}18`,
                position: 'relative',
                overflow: 'hidden',
              }}>
                {/* faint coverage strip on the bottom edge */}
                <div style={{
                  position: 'absolute', left: 0, right: 0, bottom: 0,
                  height: 1.5, background: `${palette.accent}10`,
                }}>
                  <div style={{
                    width: `${Math.min(100, coverage * 100)}%`, height: '100%',
                    background: palette.accent, opacity: 0.55,
                    transition: 'width 200ms ease',
                  }}/>
                </div>
                <div style={{
                  flex: 1,
                  fontFamily: 'Inter, system-ui, sans-serif',
                  fontSize: 12.5, color: palette.text,
                  letterSpacing: '-0.005em',
                }}>{w.name}</div>
                {tag && (
                  <div style={{
                    fontFamily: '"Geist Mono", ui-monospace, monospace',
                    fontSize: 7, letterSpacing: '0.16em',
                    color: palette.sub,
                    padding: '2px 4px', borderRadius: 3,
                    background: `${palette.accent}15`,
                  }}>{tag}</div>
                )}
                <button onClick={() => bumpWardrobe(w.id, -1)} style={{
                  width: 22, height: 22, borderRadius: 999,
                  border: `1px solid ${palette.accent}33`,
                  background: 'transparent', cursor: 'pointer',
                  color: palette.text, padding: 0,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  opacity: w.count === 0 ? 0.3 : 1,
                }} disabled={w.count === 0}>
                  <svg width="9" height="9" viewBox="0 0 10 10">
                    <path d="M2 5h6" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
                  </svg>
                </button>
                <div style={{
                  fontFamily: '"Instrument Serif", Georgia, serif',
                  fontSize: 20, color: palette.text, lineHeight: 1,
                  minWidth: 22, textAlign: 'center', fontStyle: 'italic',
                }}>{w.count}</div>
                <button onClick={() => bumpWardrobe(w.id, +1)} style={{
                  width: 22, height: 22, borderRadius: 999,
                  border: `1px solid ${palette.accent}55`,
                  background: `${palette.accent}15`,
                  cursor: 'pointer',
                  color: palette.text, padding: 0,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>
                  <svg width="9" height="9" viewBox="0 0 10 10">
                    <path d="M5 2v6M2 5h6" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
                  </svg>
                </button>
              </div>
            );
          })}
        </div>
      </div>

      {list.map((cat, ci) => (
        <div key={cat.cat} style={{ marginBottom: 18 }}>
          <div style={{
            fontFamily: '"Geist Mono", ui-monospace, monospace',
            fontSize: 9, letterSpacing: '0.2em', textTransform: 'uppercase',
            color: palette.sub, marginBottom: 8,
          }}>{cat.cat}</div>
          {cat.items.map((it, ii) => {
            const isEditing = editing && editing.ci === ci && editing.ii === ii;
            return (
              <div key={ii} style={{
                display: 'flex', alignItems: 'center', gap: 12,
                padding: '8px 0', position: 'relative',
              }}>
                <button onClick={() => toggle(ci, ii)} style={{
                  width: 18, height: 18, borderRadius: 5,
                  border: `1.5px solid ${it.checked ? palette.accent : palette.accent + '44'}`,
                  background: it.checked ? palette.accent : 'transparent',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  transition: 'all 180ms ease', flexShrink: 0,
                  cursor: 'pointer', padding: 0,
                }}>
                  {it.checked && (
                    <svg width="10" height="10" viewBox="0 0 10 10">
                      <path d="M2 5 L4.2 7 L8 3" stroke={palette.ink} strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  )}
                </button>

                {isEditing ? (
                  <input
                    ref={draftRef}
                    value={draft}
                    onChange={(e) => setDraft(e.target.value)}
                    onBlur={commitEdit}
                    onKeyDown={(e) => { if (e.key === 'Enter') commitEdit(); if (e.key === 'Escape') { setEditing(null); setDraft(''); } }}
                    style={{
                      flex: 1, padding: '2px 6px',
                      background: `${palette.accent}10`,
                      border: `1px solid ${palette.accent}55`,
                      borderRadius: 6, outline: 'none',
                      color: palette.text,
                      fontFamily: 'Inter, system-ui, sans-serif',
                      fontSize: 14,
                    }}/>
                ) : (
                  <button
                    onClick={() => { setEditing({ ci, ii }); setDraft(it.name); }}
                    style={{
                      flex: 1, textAlign: 'left',
                      background: 'transparent', border: 'none', cursor: 'text',
                      padding: 0,
                      fontFamily: 'Inter, system-ui, sans-serif',
                      fontSize: 14, color: it.checked ? palette.sub : palette.text,
                      textDecoration: it.checked ? 'line-through' : 'none',
                      textDecorationColor: palette.sub,
                    }}>{it.name}</button>
                )}

                <button onClick={() => remove(ci, ii)} style={{
                  width: 24, height: 24, borderRadius: 999,
                  background: 'transparent', border: 'none', cursor: 'pointer',
                  color: palette.sub, opacity: 0.55,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  padding: 0, flexShrink: 0,
                }} title="Remove">
                  <svg width="12" height="12" viewBox="0 0 12 12">
                    <path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
                  </svg>
                </button>
              </div>
            );
          })}
          <button onClick={() => {
            addItem(ci);
            // open the new item for editing immediately
            setTimeout(() => {
              setEditing({ ci, ii: pack[person].categories[ci].items.length });
              setDraft('New item');
            }, 0);
          }} style={{
            marginTop: 4, marginLeft: 30,
            background: 'transparent', border: 'none', cursor: 'pointer',
            padding: '4px 0',
            color: palette.accent, opacity: 0.75,
            fontFamily: 'Inter, system-ui, sans-serif',
            fontSize: 13,
            display: 'flex', alignItems: 'center', gap: 6,
          }}>
            <svg width="11" height="11" viewBox="0 0 12 12">
              <path d="M6 2v8M2 6h8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>
            </svg>
            <span>Add item</span>
          </button>
        </div>
      ))}
    </div>
  );
}

      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="3" y="5" width="14" height="12" rx="2" stroke={c} strokeWidth="1.4"/>

        <path d="M7 3v4M13 3v4" stroke={c} strokeWidth="1.4" strokeLinecap="round"/>
      </svg>
    )},
    { id: 'map', label: 'Map', icon: (c) => (
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M3 5l4-2 6 2 4-2v12l-4 2-6-2-4 2z" stroke={c} strokeWidth="1.4" strokeLinejoin="round"/>
        <path d="M7 3v14M13 5v14" stroke={c} strokeWidth="1.4"/>
      </svg>
    )},
    { id: 'pack', label: 'Pack', icon: (c) => (
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="3.5" y="6" width="13" height="11" rx="2" stroke={c} strokeWidth="1.4"/>
        <path d="M7 6V4.5a1.5 1.5 0 0 1 1.5-1.5h3A1.5 1.5 0 0 1 13 4.5V6" stroke={c} strokeWidth="1.4"/>
      </svg>
    )},
  ];
  return (
    <div style={{
      position: 'fixed', bottom: 0, left: 0, right: 0,
      height: 'auto', paddingBottom: 'max(24px, env(safe-area-inset-bottom))',
      background: `linear-gradient(180deg, ${palette.ink}00 0%, ${palette.ink} 40%)`,
      display: 'flex', justifyContent: 'space-around', alignItems: 'flex-end',
      zIndex: 30, pointerEvents: 'none',
    }}>
      <div style={{
        display: 'flex', gap: 4, padding: 6, pointerEvents: 'auto',
        background: `${palette.deep}cc`,
        backdropFilter: 'blur(20px)',
        WebkitBackdropFilter: 'blur(20px)',
        border: `1px solid ${palette.accent}22`,
        borderRadius: 999,
      }}>
        {tabs.map(t => {
          const active = tab === t.id;
          return (
            <button key={t.id} onClick={() => onTab(t.id)}
              style={{
                display: 'flex', alignItems: 'center', gap: 6,
                padding: '8px 14px', borderRadius: 999, border: 'none',
                background: active ? palette.accent : 'transparent',
                color: active ? palette.ink : palette.text,
                cursor: 'pointer', transition: 'all 200ms ease',
                fontFamily: '"Geist Mono", ui-monospace, monospace',
                fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase',
              }}>
              {t.icon(active ? palette.ink : palette.text)}
              <span>{t.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

Object.assign(window, { Hero, DayStrip, Schedule, EventRow, MapView, PackView, BottomNav, WeatherGlyph, KindGlyph, PALETTES, formatTimePair });
  </script>
  <script type="text/babel">
const TWEAK_DEFAULTS = { "units": "F", "ambient": true };

// ── Sync status indicator ──────────────────────────────────
function SyncBadge() {
  const [status, setStatus] = React.useState(window.SyncEngine.getUrl() ? 'syncing' : 'offline');
  React.useEffect(() => {
    window.SyncEngine.onStatusChange(setStatus);
  }, []);
  const label = status === 'synced' ? 'SYNCED' : status === 'syncing' ? 'SYNCING' : 'LOCAL';
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
      <span className={`sync-dot ${status}`} />
      <span>{label}</span>
    </div>
  );
}

// ── Trip header bar ────────────────────────────────────────
function TripHeader({ palette }) {
  return (
    <div style={{
      paddingTop: 'calc(12px + env(safe-area-inset-top))',
      paddingBottom: 10,
      paddingLeft: 24,
      paddingRight: 24,
      background: `linear-gradient(180deg, ${palette.deep} 0%, ${palette.deep}ee 100%)`,
      display: 'flex',
      alignItems: 'baseline',
      justifyContent: 'space-between',
    }}>
      <div style={{
        fontFamily: '"Instrument Serif", Georgia, serif',
        fontStyle: 'italic',
        fontSize: 22,
        color: palette.text,
        lineHeight: 1,
      }}>Europe '26</div>
      <div style={{
        fontFamily: '"Geist Mono", ui-monospace, monospace',
        fontSize: 9,
        letterSpacing: '0.18em',
        textTransform: 'uppercase',
        color: palette.sub,
        display: 'flex', alignItems: 'center', gap: 8,
      }}>
        <SyncBadge />
      </div>
    </div>
  );
}

function App() {
  const trip = window.TRIP;
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  const todayIdx = trip.days.findIndex(d => d.date === trip.today);
  const initialIdx = todayIdx >= 0 ? todayIdx : 0;
  const [selected, setSelected] = React.useState(initialIdx);
  const [tab, setTab] = React.useState('days');

  // ── Schedule state (local-first + sync) ───────────────────
  const SCHED_KEY = 'europe26-schedule-v3';
  const [days, setDays] = React.useState(() => {
    try {
      const raw = localStorage.getItem(SCHED_KEY);
      if (raw) {
        const stored = JSON.parse(raw);
        return trip.days.map((d, i) => ({
          ...JSON.parse(JSON.stringify(d)),
          events: (stored[i] && stored[i].events) || JSON.parse(JSON.stringify(d.events)),
        }));
      }
    } catch {}
    return JSON.parse(JSON.stringify(trip.days));
  });

  // Save to localStorage + queue sync on every schedule change
  const schedDirty = React.useRef(false);
  React.useEffect(() => {
    const slim = days.map(d => ({ events: d.events }));
    try { localStorage.setItem(SCHED_KEY, JSON.stringify(slim)); } catch {}
    if (schedDirty.current) {
      window.SyncEngine.pushDebounced({ schedule: slim });
    }
    schedDirty.current = true;
  }, [days]);

  const updateEvent = (dayIdx, evtIdx, patch) => setDays(ds => {
    const next = JSON.parse(JSON.stringify(ds));
    Object.assign(next[dayIdx].events[evtIdx], patch);
    return next;
  });
  const deleteEvent = (dayIdx, evtIdx) => setDays(ds => {
    const next = JSON.parse(JSON.stringify(ds));
    next[dayIdx].events.splice(evtIdx, 1);
    return next;
  });
  const addEvent = (dayIdx) => {
    let newIdx = 0;
    setDays(ds => {
      const next = JSON.parse(JSON.stringify(ds));
      next[dayIdx].events.push({ time: '', title: 'New event', kind: 'city', note: '' });
      newIdx = next[dayIdx].events.length - 1;
      return next;
    });
    return newIdx;
  };

  // ── Pack sync ──────────────────────────────────────────────
  // PackView manages its own React state internally. On remote pull,
  // we write to localStorage so PackView picks it up on next mount
  // (it remounts every tab switch). PackView pushes its own edits
  // to SyncEngine directly.
  const PACK_KEY = 'europe26-pack-v2';

  // ── Initial remote pull ───────────────────────────────────
  React.useEffect(() => {
    window.SyncEngine.pullRemote().then(remote => {
      if (!remote) return;
      if (remote.schedule) {
        setDays(prev => {
          return trip.days.map((d, i) => ({
            ...JSON.parse(JSON.stringify(d)),
            events: (remote.schedule[i] && remote.schedule[i].events) || d.events,
          }));
        });
        try { localStorage.setItem(SCHED_KEY, JSON.stringify(remote.schedule)); } catch {}
      }
      if (remote.pack) {
        try { localStorage.setItem(PACK_KEY, JSON.stringify(remote.pack)); } catch {}
      }
    });

    // Listen for background poll updates
    window.SyncEngine.onRemoteUpdate((remote) => {
      if (remote.schedule) {
        setDays(prev => {
          return trip.days.map((d, i) => ({
            ...JSON.parse(JSON.stringify(d)),
            events: (remote.schedule[i] && remote.schedule[i].events) || d.events,
          }));
        });
      }
      if (remote.pack) {
        try { localStorage.setItem(PACK_KEY, JSON.stringify(remote.pack)); } catch {}
      }
    });
  }, []);

  // ── Weather ───────────────────────────────────────────────
  const [weatherData, setWeatherData] = React.useState(null);
  React.useEffect(() => {
    if (!window.loadWeather) return;
    window.loadWeather(trip.startDate, trip.endDate)
      .then(setWeatherData)
      .catch(err => console.warn('weather load:', err));
  }, [trip.startDate, trip.endDate]);

  const liveDays = React.useMemo(() => (
    window.mergeWeather ? window.mergeWeather(days, weatherData) : days
  ), [days, weatherData]);

  const day = liveDays[selected];
  const palette = window.PALETTES[day.theme];

  // ── Keyboard nav ──────────────────────────────────────────
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowRight') setSelected(s => Math.min(days.length - 1, s + 1));
      if (e.key === 'ArrowLeft')  setSelected(s => Math.max(0, s - 1));
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [days.length]);

  // ── Touch swipe ───────────────────────────────────────────
  const touchRef = React.useRef({ x: 0, y: 0, t: 0 });
  const onTouchStart = (e) => {
    if (tab !== 'days') return;
    const t = e.touches[0];
    touchRef.current = { x: t.clientX, y: t.clientY, t: Date.now() };
  };
  const onTouchEnd = (e) => {
    if (tab !== 'days') return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchRef.current.x;
    const dy = t.clientY - touchRef.current.y;
    if (Math.abs(dx) > 48 && Math.abs(dy) < 60 && Date.now() - touchRef.current.t < 500) {
      if (dx < 0) setSelected(s => Math.min(days.length - 1, s + 1));
      else setSelected(s => Math.max(0, s - 1));
    }
  };

  // ── Theme color ───────────────────────────────────────────
  React.useEffect(() => {
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', palette.deep);
    document.body.style.background = palette.ink;
  }, [palette]);

  return (
    <div
      onTouchStart={onTouchStart}
      onTouchEnd={onTouchEnd}
      style={{
        minHeight: '100vh',
        minHeight: '100dvh',
        background: palette.ink,
        transition: 'background 600ms ease',
        color: palette.text,
        paddingBottom: 120,
        position: 'relative',
      }}>
      <TripHeader palette={palette} />

      {tab === 'days' && (
        <React.Fragment>
          <Hero day={day} palette={palette} dayIndex={selected} total={liveDays.length} units={tweaks.units}/>
          <DayStrip days={liveDays} selected={selected} onSelect={setSelected} palette={palette} units={tweaks.units}/>
          <Schedule day={day} dayIdx={selected} palette={palette} units={tweaks.units}
            onUpdate={updateEvent} onDelete={deleteEvent} onAdd={addEvent} />
          {selected === liveDays.length - 1 && (
            <div style={{
              margin: '20px 20px 12px', padding: '24px 20px',
              border: `1px solid ${palette.accent}33`, borderRadius: 18,
              background: `${palette.accent}10`, textAlign: 'center',
            }}>
              <div style={{ fontFamily: '"Geist Mono", ui-monospace, monospace', fontSize: 9, letterSpacing: '0.22em', textTransform: 'uppercase', color: palette.sub }}>End of trip</div>
              <div style={{ marginTop: 6, fontFamily: '"Instrument Serif", Georgia, serif', fontStyle: 'italic', fontSize: 32, color: palette.text, lineHeight: 1.05 }}>see you home</div>
            </div>
          )}
        </React.Fragment>
      )}
      {tab === 'map' && (
        <MapView palette={palette} days={liveDays} selected={selected} onSelect={(i) => { setSelected(i); setTab('days'); }}/>
      )}
      {tab === 'pack' && (
        <PackView palette={palette} />
      )}
      <BottomNav tab={tab} onTab={setTab} palette={palette} />
    </div>
  );
}

function TweaksUI() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  return (
    <window.TweaksPanel>
      <window.TweakSection label="Display">
        <window.TweakRadio label="Units" value={tweaks.units}
          options={[{ value: 'F', label: '°F' }, { value: 'C', label: '°C' }]}
          onChange={(v) => setTweak('units', v)} />
        <window.TweakToggle label="Ambient backdrop" value={tweaks.ambient} onChange={(v) => setTweak('ambient', v)}/>
      </window.TweakSection>
    </window.TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <React.Fragment><App /><TweaksUI /></React.Fragment>
);
  </script>
</body>
</html>
