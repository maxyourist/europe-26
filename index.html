  <script>
// Live weather via Open-Meteo (no API key, free, CORS-friendly).
// Fetches per-city daily forecasts for the trip date range, caches 6h in
// localStorage, and merges into the day objects at render time.

(function() {
  const COORDS = {
    london:  { lat: 51.5074, lon:  -0.1278 },
    rome:    { lat: 41.9028, lon:  12.4964 },
    tuscany: { lat: 43.3188, lon:  11.3308 }, // Siena
    paros:   { lat: 37.0856, lon:  25.1500 },
    paris:   { lat: 48.8566, lon:   2.3522 },
  };
  const CACHE_KEY = 'europe26-weather-v1';
  const TTL_MS    = 6 * 60 * 60 * 1000; // 6h

  // WMO weather code → simple icon family (matches WeatherGlyph kinds)
  function codeToIcon(code) {
    if (code === 0) return 'sun';
    if (code <= 3)  return 'partly';
    if (code <= 48) return 'cloud';
    return 'drizzle';
  }
  // WMO code → short condition phrase
  const CODE_COND = {
    0:  'Clear skies',
    1:  'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
    45: 'Fog', 48: 'Fog',
    51: 'Light drizzle', 53: 'Drizzle', 55: 'Heavy drizzle',
    56: 'Freezing drizzle', 57: 'Freezing drizzle',
    61: 'Light rain', 63: 'Rain', 65: 'Heavy rain',
    66: 'Freezing rain', 67: 'Freezing rain',
    71: 'Light snow', 73: 'Snow', 75: 'Heavy snow', 77: 'Snow grains',
    80: 'Light showers', 81: 'Showers', 82: 'Heavy showers',
    85: 'Snow showers', 86: 'Snow showers',
    95: 'Thunderstorm', 96: 'Thunderstorm', 99: 'Thunderstorm',
  };

  async function fetchOne(c, start, end) {
    const url = `https://api.open-meteo.com/v1/forecast`
      + `?latitude=${c.lat}&longitude=${c.lon}`
      + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code,wind_speed_10m_max`
      + `&start_date=${start}&end_date=${end}&timezone=auto`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('weather ' + res.status);
    const data = await res.json();
    return data.daily;
  }

  window.loadWeather = async function(start, end) {
    // cache hit?
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) {
        const cached = JSON.parse(raw);
        if (cached.fetchedAt && (Date.now() - cached.fetchedAt) < TTL_MS
            && cached.start === start && cached.end === end) {
          return cached.data;
        }
      }
    } catch {}

    const keys = Object.keys(COORDS);
    const out = {};
    await Promise.all(keys.map(async (k) => {
      try { out[k] = await fetchOne(COORDS[k], start, end); }
      catch (e) { console.warn('weather miss', k, e); }
    }));

    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        fetchedAt: Date.now(), start, end, data: out,
      }));
    } catch {}
    return out;
  };

  // Merge fetched daily forecast into each day's `weather` object. Transit
  // days resolve to their journey destination so the forecast matches where
  // the day ends up.
  window.mergeWeather = function(days, weatherData) {
    if (!weatherData) return days;
    return days.map(d => {
      let key = d.theme;
      if ((!COORDS[key]) && d.journey) {
        key = d.journey.to.toLowerCase();
      }
      const wx = weatherData[key];
      if (!wx || !wx.time) return d;
      const i = wx.time.indexOf(d.date);
      if (i < 0) return d;
      return {
        ...d,
        weather: {
          hi:     Math.round(wx.temperature_2m_max[i]),
          lo:     Math.round(wx.temperature_2m_min[i]),
          icon:   codeToIcon(wx.weather_code[i]),
          cond:   CODE_COND[wx.weather_code[i]] || 'Mild',
          precip: Math.round(wx.precipitation_probability_max[i] || 0),
          wind:   Math.round(wx.wind_speed_10m_max[i] || 0),
          live:   true,
        },
      };
    });
  };
})();

// ── Cloud sync engine ───────────────────────────────────────
// Local-first: all edits hit React state + localStorage instantly.
// A debounced POST syncs to Google Sheets via Apps Script.
// On load, fetches remote state and merges (remote wins if newer).
(function() {
  // ⚠️ PASTE YOUR DEPLOYED APPS SCRIPT WEB APP URL HERE:
  const SYNC_URL = 'https://script.google.com/macros/s/AKfycbyhuDyrYufRTkJQ-i652ATCVhcAEh4FV9IxuBjLNPlIs_GZGQEHP2XRjVJTQRVELd3z/exec';

  const SCHED_CACHE = 'europe26-schedule-v3';
  const PACK_CACHE  = 'europe26-pack-v2';
  const TS_CACHE    = 'europe26-sync-ts';
  const DEBOUNCE_MS = 1500;

  let _timer = null;
  let _pending = {};
  let _status = 'synced'; // 'synced' | 'syncing' | 'offline'
  let _listeners = [];

  function onStatusChange(fn) { _listeners.push(fn); }
  function _notify() { _listeners.forEach(fn => fn(_status)); }

  // ── Fetch remote state on load ─────────────────────────────
  async function pullRemote() {
    if (!SYNC_URL) { _status = 'offline'; _notify(); return null; }
    try {
      _status = 'syncing'; _notify();
      const res = await fetch(SYNC_URL);
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      // Store remote timestamp
      if (data.updated) {
        try { localStorage.setItem(TS_CACHE, data.updated); } catch {}
      }
      _status = 'synced'; _notify();
      return data;
    } catch (err) {
      console.warn('sync pull failed:', err);
      _status = 'offline'; _notify();
      return null;
    }
  }

  // ── Push to remote (debounced) ─────────────────────────────
  // Accepts { schedule?, pack? }. Merges with any pending unsent
  // changes and resets the debounce timer so rapid edits batch up.
  function pushDebounced(data) {
    Object.assign(_pending, data);
    if (_timer) clearTimeout(_timer);
    _timer = setTimeout(_flush, DEBOUNCE_MS);
  }

  async function _flush() {
    if (!SYNC_URL) return;
    const payload = { ..._pending };
    _pending = {};
    _timer = null;

    try {
      _status = 'syncing'; _notify();
      const res = await fetch(SYNC_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(res.status);
      const result = await res.json();
      if (result.error) throw new Error(result.error);
      if (result.updated) {
        try { localStorage.setItem(TS_CACHE, result.updated); } catch {}
      }
      _status = 'synced'; _notify();
    } catch (err) {
      console.warn('[sync] push failed:', err);
      Object.assign(_pending, payload);
      _status = 'offline'; _notify();
    }
  }

  // ── Background polling ─────────────────────────────────────
  // Every 30s, pull remote to pick up the other person's changes.
  // Only updates if the remote timestamp is newer than our last known.
  let _pollCallback = null;
  function onRemoteUpdate(fn) { _pollCallback = fn; }

  async function _poll() {
    if (!SYNC_URL) return;
    // Don't poll while we have unsent changes
    if (_timer || Object.keys(_pending).length > 0) return;
    try {
      const res = await fetch(SYNC_URL);
      if (!res.ok) return;
      const data = await res.json();
      if (data.error) return;
      const localTs = localStorage.getItem(TS_CACHE);
      if (data.updated && data.updated !== localTs) {
        localStorage.setItem(TS_CACHE, data.updated);
        if (_pollCallback) _pollCallback(data);
      }
    } catch {}
  }
  setInterval(_poll, 30000);

  window.SyncEngine = {
    pullRemote,
    pushDebounced,
    onStatusChange,
    onRemoteUpdate,
    getUrl: () => SYNC_URL,
  };
})();
  </script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
  </script>
  <script type="text/babel">
// Itinerary views — Hero, DayStrip, Weather, Schedule, BottomNav, MapView

// ── time formatter ─────────────────────────────────────────
// Returns { military, twelve } for any time string that contains a H:MM
// (with optional AM/PM). Preserves prefixes like "BY ". Returns null if the
// string is a label without a specific time (AM, PM, EVE, ALL DAY, LATE, etc).
function formatTimePair(timeStr) {
  if (!timeStr) return null;
  const m = timeStr.match(/(\d{1,2}):(\d{2})\s*(AM|PM|am|pm)?/);
  if (!m) return null;
  let h = parseInt(m[1], 10);
  const min = m[2];
  const ampm = m[3] && m[3].toUpperCase();
  let h24;
  if (ampm === 'PM') h24 = (h % 12) + 12;
  else if (ampm === 'AM') h24 = h % 12;
  else h24 = h;
  if (h24 > 23) return null;
  const h12 = (h24 % 12 === 0) ? 12 : (h24 % 12);
  const period = h24 < 12 ? 'AM' : 'PM';
  const military = `${String(h24).padStart(2,'0')}:${min}`;
  const twelve   = `${h12}:${min} ${period}`;
  const prefix = timeStr.slice(0, m.index).trim();
  const pre = prefix ? prefix + ' ' : '';
  return { military: pre + military, twelve: pre + twelve };
}

// ── weather glyphs (hand-drawn, simple shapes only) ─────────
function WeatherGlyph({ kind, size = 28, color = '#fff', secondary = 'rgba(255,255,255,0.5)' }) {
  const s = size;
  if (kind === 'sun') return (
    <svg width={s} height={s} viewBox="0 0 32 32">
      <circle cx="16" cy="16" r="6.5" fill={color} />
      {[0,45,90,135,180,225,270,315].map(a => (
        <rect key={a} x="15" y="2" width="2" height="4" rx="1" fill={color}
              transform={`rotate(${a} 16 16)`} />
      ))}
    </svg>
  );
  if (kind === 'cloud') return (
    <svg width={s} height={s} viewBox="0 0 32 32">
      <ellipse cx="14" cy="20" rx="11" ry="6" fill={color} />
      <circle cx="11" cy="16" r="5" fill={color} />
      <circle cx="19" cy="14" r="6" fill={color} />
    </svg>
  );
  if (kind === 'partly') return (
    <svg width={s} height={s} viewBox="0 0 32 32">
      <circle cx="11" cy="11" r="5.5" fill={color} />
      <ellipse cx="19" cy="22" rx="10" ry="5.5" fill={secondary} />
      <circle cx="16" cy="18" r="4.5" fill={secondary} />
      <circle cx="23" cy="17" r="5" fill={secondary} />
    </svg>
  );
  if (kind === 'drizzle') return (
    <svg width={s} height={s} viewBox="0 0 32 32">
      <ellipse cx="14" cy="14" rx="11" ry="5.5" fill={color} />
      <circle cx="11" cy="11" r="4.5" fill={color} />
      <circle cx="19" cy="10" r="5.5" fill={color} />
      <line x1="9"  y1="22" x2="7"  y2="28" stroke={secondary} strokeWidth="1.6" strokeLinecap="round"/>
      <line x1="15" y1="22" x2="13" y2="28" stroke={secondary} strokeWidth="1.6" strokeLinecap="round"/>
      <line x1="21" y1="22" x2="19" y2="28" stroke={secondary} strokeWidth="1.6" strokeLinecap="round"/>
    </svg>
  );
  return null;
}

// ── event kind glyphs ───────────────────────────────────────
function KindGlyph({ kind, color }) {
  const s = 14;
  const stroke = { stroke: color, strokeWidth: 1.6, fill: 'none', strokeLinecap: 'round', strokeLinejoin: 'round' };
  if (kind === 'flight') return (
    <svg width={s} height={s} viewBox="0 0 16 16"><path d="M2 9l5-1 3-6 1.5 0.5-1.5 6 4-0.8 1-0.2 0 1.5-4 1-1 4-1.5-0.5 1-4-5 1L2 9z" fill={color}/></svg>
  );
  if (kind === 'drive') return (
    <svg width={s} height={s} viewBox="0 0 16 16"><rect x="2" y="7" width="12" height="5" rx="1" {...stroke}/><path d="M3 7l1.5-3h7L13 7" {...stroke}/><circle cx="5" cy="13" r="1" fill={color}/><circle cx="11" cy="13" r="1" fill={color}/></svg>
  );
  if (kind === 'hotel') return (
    <svg width={s} height={s} viewBox="0 0 16 16"><path d="M2 13V5M14 13V8c0-1-1-2-2-2H6" {...stroke}/><path d="M2 9h12" {...stroke}/><circle cx="5" cy="8" r="1.3" fill={color}/></svg>
  );
  if (kind === 'food') return (
    <svg width={s} height={s} viewBox="0 0 16 16"><path d="M3 2v5c0 1 0.5 1.5 1.5 1.5S6 8 6 7V2M4.5 9v5" {...stroke}/><path d="M11 2c-1 0-2 2-2 4s1 3 2 3v5" {...stroke}/></svg>
  );
  if (kind === 'ferry') return (
    <svg width={s} height={s} viewBox="0 0 16 16"><path d="M2 11l1.5 3h9L14 11" {...stroke}/><path d="M3 11V7l5-3 5 3v4" {...stroke}/><path d="M8 4v3" {...stroke}/></svg>
  );
  if (kind === 'city') return (
    <svg width={s} height={s} viewBox="0 0 16 16"><path d="M2 14V8l4-2v8M6 14V4l4-2v12M10 14V7l4 2v5" {...stroke}/></svg>
  );
  if (kind === 'task') return (
    <svg width={s} height={s} viewBox="0 0 16 16"><rect x="3" y="3" width="10" height="10" rx="2" {...stroke}/><path d="M5.5 8l2 2 3-4" {...stroke}/></svg>
  );
  return <span style={{ width: s, height: s, display: 'inline-block' }} />;
}

// ── JOURNEY HEADER (transit days) ───────────────────────────
// Boarding-pass style display for travel days. Top row: huge airport codes
// either side, arched flight path with airplane between. Below: city names,
// then a perforated divider with depart-time / duration / arrive-time in
// monospace — like a ticket stub.
function JourneyHeader({ journey, palette }) {
  const modeLabel = (() => {
    if (journey.mode === 'ferry') return 'Ferry';
    if (journey.mode === 'flight+ferry') return 'Fly + ferry';
    return 'Nonstop';
  })();
  return (
    <div style={{ marginTop: 18, position: 'relative' }}>
      {/* Airport codes row + flight path */}
      <div style={{
        display: 'grid',
        gridTemplateColumns: 'auto 1fr auto',
        alignItems: 'center',
        gap: 12,
      }}>
        <div style={{
          fontFamily: '"Instrument Serif", Georgia, serif',
          fontStyle: 'italic', fontWeight: 400,
          fontSize: 46, lineHeight: 0.9, letterSpacing: '-0.02em',
          color: palette.text,
        }}>{journey.fromCode}</div>

        {/* flight arc */}
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          <svg width="100%" height="40" viewBox="0 0 120 40" preserveAspectRatio="none"
               style={{ display: 'block', maxWidth: 180 }}>
            <defs>
              <linearGradient id="jrnArc" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stopColor={palette.accent} stopOpacity="0.35"/>
                <stop offset="50%"  stopColor={palette.accent} stopOpacity="0.9"/>
                <stop offset="100%" stopColor={palette.accent} stopOpacity="0.35"/>
              </linearGradient>
            </defs>
            {/* arc */}
            <path d="M 4 32 Q 60 -10 116 32"
                  fill="none" stroke="url(#jrnArc)" strokeWidth="1.2"
                  strokeDasharray="2.5 2.5" strokeLinecap="round"/>
            {/* origin dot */}
            <circle cx="4" cy="32" r="2.4" fill={palette.accent}/>
            <circle cx="4" cy="32" r="4.5" fill="none" stroke={palette.accent} strokeOpacity="0.4" strokeWidth="0.6"/>
            {/* destination dot */}
            <circle cx="116" cy="32" r="2.4" fill={palette.accent}/>
            <circle cx="116" cy="32" r="4.5" fill="none" stroke={palette.accent} strokeOpacity="0.4" strokeWidth="0.6"/>
            {/* airplane at apex */}
            <g transform="translate(60 6) rotate(90)">
              <path d="M0 -8 L1.6 1 L8 3 L8 4.5 L1 4 L0.5 9 L2 10 L2 11 L-2 11 L-2 10 L-0.5 9 L-1 4 L-8 4.5 L-8 3 L-1.6 1 Z"
                    fill={palette.accent}/>
            </g>
          </svg>
        </div>

        <div style={{
          fontFamily: '"Instrument Serif", Georgia, serif',
          fontStyle: 'italic', fontWeight: 400,
          fontSize: 46, lineHeight: 0.9, letterSpacing: '-0.02em',
          color: palette.text,
          paddingRight: 4,
        }}>{journey.toCode}</div>
      </div>

      {/* City names underneath codes */}
      <div style={{
        marginTop: 4,
        display: 'grid',
        gridTemplateColumns: '1fr 1fr 1fr',
        gap: 8,
      }}>
        <div style={{
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase',
          color: palette.sub, textAlign: 'left',
        }}>{journey.from}</div>
        <div/>
        <div style={{
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase',
          color: palette.sub, textAlign: 'right',
        }}>{journey.to}</div>
      </div>

      {/* Perforated ticket-stub line */}
      <div style={{
        marginTop: 14, marginBottom: 12,
        display: 'flex', alignItems: 'center', gap: 8,
        opacity: 0.55,
      }}>
        <div style={{
          width: 6, height: 6, borderRadius: 999,
          background: palette.ink, boxShadow: `inset 0 0 0 1px ${palette.accent}55`,
          marginLeft: -3,
        }}/>
        <div style={{
          flex: 1, height: 1,
          backgroundImage: `repeating-linear-gradient(90deg, ${palette.accent}55 0 4px, transparent 4px 8px)`,
        }}/>
        <div style={{
          width: 6, height: 6, borderRadius: 999,
          background: palette.ink, boxShadow: `inset 0 0 0 1px ${palette.accent}55`,
          marginRight: -3,
        }}/>
      </div>

      {/* Times + duration row */}
      <div style={{
        display: 'grid',
        gridTemplateColumns: '1fr auto 1fr',
        alignItems: 'baseline',
        gap: 10,
      }}>
        <div>
          <div style={{
            fontFamily: '"Geist Mono", ui-monospace, monospace',
            fontSize: 8, letterSpacing: '0.22em', textTransform: 'uppercase',
            color: palette.sub, marginBottom: 2,
          }}>Depart</div>
          {(() => {
            const p = formatTimePair(journey.depart);
            return (
              <React.Fragment>
                <div style={{
                  fontFamily: '"Instrument Serif", Georgia, serif',
                  fontStyle: 'italic', fontSize: 22, lineHeight: 1,
                  color: palette.text,
                }}>{p ? p.military : (journey.depart || '—')}</div>
                {p && (
                  <div style={{
                    marginTop: 3,
                    fontFamily: '"Geist Mono", ui-monospace, monospace',
                    fontSize: 10, letterSpacing: '0.06em',
                    color: palette.sub,
                  }}>{p.twelve}</div>
                )}
              </React.Fragment>
            );
          })()}
        </div>

        <div style={{ textAlign: 'center' }}>
          <div style={{
            fontFamily: '"Geist Mono", ui-monospace, monospace',
            fontSize: 8, letterSpacing: '0.22em', textTransform: 'uppercase',
            color: palette.sub,
          }}>{modeLabel}</div>
          <div style={{
            marginTop: 2,
            fontFamily: '"Geist Mono", ui-monospace, monospace',
            fontSize: 11, letterSpacing: '0.12em',
            color: palette.accent,
            whiteSpace: 'nowrap',
          }}>{journey.duration || ''}</div>
        </div>

        <div style={{ textAlign: 'right' }}>
          <div style={{
            fontFamily: '"Geist Mono", ui-monospace, monospace',
            fontSize: 8, letterSpacing: '0.22em', textTransform: 'uppercase',
            color: palette.sub, marginBottom: 2,
          }}>Arrive {journey.arriveOffset || ''}</div>
          {(() => {
            const p = formatTimePair(journey.arrive);
            return (
              <React.Fragment>
                <div style={{
                  fontFamily: '"Instrument Serif", Georgia, serif',
                  fontStyle: 'italic', fontSize: 22, lineHeight: 1,
                  color: palette.text,
                }}>{p ? p.military : (journey.arrive || '—')}</div>
                {p && (
                  <div style={{
                    marginTop: 3,
                    fontFamily: '"Geist Mono", ui-monospace, monospace',
                    fontSize: 10, letterSpacing: '0.06em',
                    color: palette.sub,
                  }}>{p.twelve}</div>
                )}
              </React.Fragment>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

// ── HERO ────────────────────────────────────────────────────

  const tempFmt = (c) => units === 'F' ? Math.round(c * 9/5 + 32) : c;
  return (
    <div style={{
      padding: 'calc(16px + env(safe-area-inset-top)) 24px 22px',
      position: 'relative',
      background: `linear-gradient(180deg, ${palette.deep} 0%, ${palette.ink} 100%)`,
      transition: 'background 600ms ease',
      overflow: 'hidden',
    }}>
      {/* faint city silhouette tint */}
      <div style={{
        position: 'absolute', inset: 0, opacity: 0.18, pointerEvents: 'none',
        background: `radial-gradient(120% 60% at 80% 0%, ${palette.accent}55, transparent 60%)`,
      }} />
      {/* meta line */}
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        fontFamily: '"Geist Mono", "JetBrains Mono", ui-monospace, monospace',
        fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase',
        color: palette.sub, position: 'relative',
      }}>
        <span>Day {String(dayIndex + 1).padStart(2,'0')} / {String(total).padStart(2,'0')}</span>
        <span>{new Date(day.date + 'T00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} · {day.dow}</span>
      </div>

      {day.journey ? (
        <JourneyHeader journey={day.journey} palette={palette} />
      ) : (
        <React.Fragment>
          {/* big italic city name */}
          <div style={{
            marginTop: 14, fontFamily: '"Instrument Serif", "Cormorant Garamond", Georgia, serif',
            fontStyle: 'italic', fontWeight: 400,
            fontSize: 72, lineHeight: 0.92, letterSpacing: '-0.02em',
            color: palette.text, position: 'relative',
          }}>
            {day.city}
          </div>

          <div style={{
            marginTop: 6, color: palette.sub,
            fontFamily: '"Geist Mono", "JetBrains Mono", ui-monospace, monospace',
            fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase',
            position: 'relative',
          }}>
            {day.country}
          </div>
        </React.Fragment>
      )}

      {/* weather row */}
      <div style={{
        marginTop: 22, display: 'flex', alignItems: 'flex-end', gap: 16,
        position: 'relative',
      }}>
        <WeatherGlyph kind={day.weather.icon} size={44} color={palette.accent} secondary={palette.accent + '88'} />
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
          <div style={{
            fontFamily: '"Instrument Serif", Georgia, serif',
            fontSize: 40, lineHeight: 1, color: palette.text, fontWeight: 400,
          }}>{tempFmt(day.weather.hi)}°</div>
          <div style={{
            fontFamily: '"Geist Mono", ui-monospace, monospace',
            fontSize: 12, color: palette.sub, letterSpacing: '0.1em',
          }}>/ {tempFmt(day.weather.lo)}°{units}</div>
        </div>
        <div style={{ flex: 1 }} />
        <div style={{
          fontFamily: 'Inter, system-ui, sans-serif',
          fontSize: 11, color: palette.sub, textAlign: 'right',
          maxWidth: 130, lineHeight: 1.35,
        }}>
          {day.weather.cond}
        </div>
      </div>

      {/* weather details strip */}
      <div style={{
        marginTop: 16, display: 'flex', gap: 14, alignItems: 'center',
        fontFamily: '"Geist Mono", ui-monospace, monospace',
        fontSize: 9, letterSpacing: '0.16em', textTransform: 'uppercase',
        color: palette.sub, position: 'relative',
      }}>
        <span>Precip · {day.weather.precip}%</span>
        <span style={{ opacity: 0.4 }}>|</span>
        <span>Wind · {day.weather.wind} km/h</span>
        <span style={{ opacity: 0.4 }}>|</span>
        <span>{day.weather.icon === 'sun' ? 'CLEAR' : day.weather.icon === 'partly' ? 'P. CLOUDY' : day.weather.icon === 'drizzle' ? 'DRIZZLE' : 'CLOUDY'}</span>
        <span style={{ flex: 1 }}/>
        {day.weather.live && (
          <span style={{
            display: 'inline-flex', alignItems: 'center', gap: 4,
            color: palette.accent, letterSpacing: '0.2em',
          }}>
            <span style={{
              width: 5, height: 5, borderRadius: 999,
              background: palette.accent,
              animation: 'pulse 1.6s ease-in-out infinite',
            }}/>
            LIVE
          </span>
        )}
      </div>
    </div>
  );
}

// ── DAY STRIP ───────────────────────────────────────────────
function DayStrip({ days, selected, onSelect, palette, units }) {
  const stripRef = React.useRef(null);
  React.useEffect(() => {
    const el = stripRef.current?.querySelector(`[data-idx="${selected}"]`);
    if (el && el.scrollIntoView) {
      el.parentElement.scrollTo({ left: el.offsetLeft - 80, behavior: 'smooth' });
    }
  }, [selected]);
  const tempFmt = (c) => units === 'F' ? Math.round(c * 9/5 + 32) : c;
  return (
    <div style={{
      background: palette.ink, borderTop: `1px solid ${palette.accent}22`,
      transition: 'background 600ms ease',
    }}>
      <div ref={stripRef} style={{
        display: 'flex', gap: 8, overflowX: 'auto', padding: '14px 20px 16px',
        scrollbarWidth: 'none',
      }} className="day-strip">
        {days.map((d, i) => {
          const p = PALETTES[d.theme];
          const active = i === selected;
          return (
            <button
              key={i}
              data-idx={i}
              onClick={() => onSelect(i)}
              style={{
                flex: '0 0 auto',
                width: 64, height: 84,
                borderRadius: 18,
                border: active ? `1.5px solid ${palette.accent}` : `1px solid ${palette.accent}22`,
                background: active ? `${palette.accent}18` : 'transparent',
                color: palette.text,
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'space-between',
                padding: '10px 0 8px', cursor: 'pointer',
                transition: 'all 240ms ease',
                fontFamily: 'Inter, system-ui, sans-serif',
              }}>
              <div style={{
                fontFamily: '"Geist Mono", ui-monospace, monospace',
                fontSize: 9, letterSpacing: '0.14em', color: palette.sub, textTransform: 'uppercase',
              }}>{d.dow}</div>
              <div style={{
                fontFamily: '"Instrument Serif", Georgia, serif',
                fontSize: 24, lineHeight: 1, color: palette.text,
              }}>{new Date(d.date + 'T00:00').getDate()}</div>
              <WeatherGlyph kind={d.weather.icon} size={16} color={p.accent} secondary={p.accent + '88'} />
              <div style={{
                fontFamily: '"Geist Mono", ui-monospace, monospace',
                fontSize: 9, color: palette.sub, letterSpacing: '0.06em',
              }}>{tempFmt(d.weather.hi)}°</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── EVENT ROW ───────────────────────────────────────────────
function EventRow({ event, palette, isLast, units = 'C', editing, draft, onEnter, onChange, onSave, onCancel, onDelete }) {
  const [open, setOpen] = React.useState(false);
  const arrival = event.arrival;
  const tempFmt = (c) => units === 'F' ? Math.round(c * 9/5 + 32) : c;

  // Body click handler: in view mode, either expand note (if any) or enter edit mode.
  // We default tap → enter edit (the user asked for click-to-edit). Long-press / note
  // expansion would be a separate gesture if we wanted to keep it; for now the editor
  // exposes the note field directly so collapsing isn't needed.
  const onBodyClick = () => { if (!editing) onEnter(); };

  // Arrival rows: enlarged hero card embedded inline. Picks up the destination
  // palette so it visually telegraphs the new place even though the day's theme
  // hasn't changed yet.
  if (arrival) {
    const destTheme = arrival.city.toLowerCase();
    const destPal = window.PALETTES[destTheme] || palette;
    return (
      <div style={{
        display: 'grid', gridTemplateColumns: '64px 1fr',
        cursor: editing ? 'default' : 'pointer',
      }} onClick={onBodyClick}>
        <div style={{
          padding: '20px 0 20px 20px',
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 10, letterSpacing: '0.08em',
          color: palette.sub,
          borderRight: `1px solid ${palette.accent}18`,
          position: 'relative',
        }}>
          {(() => {
            const p = formatTimePair(event.time);
            return p ? (
              <React.Fragment>
                <div>{p.military}</div>
                <div style={{ fontSize: 8.5, opacity: 0.6, marginTop: 2, letterSpacing: '0.04em' }}>{p.twelve}</div>
              </React.Fragment>
            ) : event.time;
          })()}
          <div style={{
            position: 'absolute', right: -5, top: 24,
            width: 9, height: 9, borderRadius: 999,
            background: destPal.accent,
            boxShadow: `0 0 0 3px ${palette.ink}, 0 0 0 5px ${destPal.accent}33`,
          }} />
        </div>

        <div style={{
          margin: '12px 16px 12px 14px',
          padding: '16px 16px 16px',
          borderRadius: 14,
          background: `linear-gradient(180deg, ${destPal.deep}cc 0%, ${destPal.ink}aa 100%)`,
          border: `1px solid ${destPal.accent}33`,
          overflow: 'hidden',
          position: 'relative',
        }}>
          {/* tint glow */}
          <div style={{
            position: 'absolute', inset: 0, pointerEvents: 'none',
            background: `radial-gradient(80% 60% at 100% 0%, ${destPal.accent}33, transparent 60%)`,
          }} />
          <div style={{ position: 'relative' }}>
            <div style={{
              display: 'flex', alignItems: 'center', gap: 6,
              fontFamily: '"Geist Mono", ui-monospace, monospace',
              fontSize: 9, letterSpacing: '0.2em', textTransform: 'uppercase',
              color: destPal.sub,
            }}>
              <KindGlyph kind={event.kind} color={destPal.accent} />
              <span>Arriving · {arrival.time}</span>
              {event.flag && (
                <span style={{

// ── SCHEDULE ────────────────────────────────────────────────
function Schedule({ day, dayIdx, palette, units, onUpdate, onDelete, onAdd }) {
  // Editing state lives at the schedule level so only one row at a time is in
  // edit mode (and the draft is forgotten when the user navigates away).
  const [editing, setEditing] = React.useState(null);
  // Reset edit state when switching days.
  React.useEffect(() => { setEditing(null); }, [dayIdx]);

  const enter = (i, evt) => setEditing({ idx: i, draft: { time: evt.time || '', title: evt.title || '', note: evt.note || '' } });
  const cancel = () => setEditing(null);
  const save = () => {
    if (editing) {
      onUpdate(dayIdx, editing.idx, {
        time:  editing.draft.time.trim(),
        title: editing.draft.title.trim() || 'Untitled',
        note:  editing.draft.note.trim(),
      });
      setEditing(null);
    }
  };
  const del = () => {
    if (editing) { onDelete(dayIdx, editing.idx); setEditing(null); }
  };
  const change = (k, v) => setEditing(s => s && ({ ...s, draft: { ...s.draft, [k]: v } }));
  const handleAdd = () => {
    const newIdx = onAdd(dayIdx);
    // open the freshly-added event for editing
    setTimeout(() => setEditing({ idx: newIdx, draft: { time: '', title: 'New event', note: '' } }), 0);
  };

  return (
    <div style={{
      background: palette.ink,
      transition: 'background 600ms ease',
      paddingBottom: 8,
    }}>
      <div style={{
        padding: '20px 20px 10px',
        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
      }}>
        <div style={{
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 10, letterSpacing: '0.2em', textTransform: 'uppercase',
          color: palette.sub,
        }}>Schedule</div>
        <div style={{
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 10, letterSpacing: '0.14em',
          color: palette.sub,
        }}>{day.events.length} {day.events.length === 1 ? 'item' : 'items'} · tap to edit</div>
      </div>
      <div>
        {day.events.map((e, i) => (
          <EventRow
            key={i} event={e} palette={palette}
            isLast={i === day.events.length - 1} units={units}
            editing={editing && editing.idx === i}
            draft={editing && editing.idx === i ? editing.draft : null}
            onEnter={() => enter(i, e)}
            onChange={change}
            onSave={save}
            onCancel={cancel}
            onDelete={del}
          />
        ))}
        {/* + Add event */}
        <div style={{ padding: '14px 20px 18px' }}>
          <button onClick={handleAdd} style={{
            display: 'flex', alignItems: 'center', gap: 8,
            background: 'transparent', border: `1px dashed ${palette.accent}55`,
            color: palette.accent, opacity: 0.85,
            cursor: 'pointer',
            padding: '10px 14px', borderRadius: 12,
            fontFamily: 'Inter, system-ui, sans-serif',
            fontSize: 13,
          }}>
            <svg width="12" height="12" viewBox="0 0 12 12">
              <path d="M6 2v8M2 6h8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>
            </svg>
            <span>Add event</span>
          </button>
        </div>
      </div>
    </div>
  );
}

// ── MAP VIEW (real Leaflet map) ──────────────────────────────
// Uses CartoDB Voyager (color) tiles via Leaflet so this looks like an actual
// map of Europe with the transatlantic LAX → London leg drawn as a proper
// great-circle arc (the real path of long-haul flights).
const CITIES = [
  { id: 'lax',     name: 'LAX',     lat: 33.9425, lon: -118.4081, dayIdx: 0 },
  { id: 'london',  name: 'London',  lat: 51.5074, lon:   -0.1278 },
  { id: 'paris',   name: 'Paris',   lat: 48.8566, lon:    2.3522 },
  { id: 'rome',    name: 'Rome',    lat: 41.9028, lon:   12.4964 },
  { id: 'tuscany', name: 'Tuscany', lat: 43.3188, lon:   11.3308 }, // Siena
  { id: 'paros',   name: 'Paros',   lat: 37.0856, lon:   25.1500 },
];
const ROUTE_ORDER = ['lax', 'london', 'rome', 'tuscany', 'rome', 'paros', 'paris'];

// Great-circle interpolation — flights follow great circles, which look like
// arcs on a Mercator projection. n=64 is plenty smooth for a polyline.
function gcArc(a, b, n) {
  const φ1 = a[0] * Math.PI / 180, λ1 = a[1] * Math.PI / 180;
  const φ2 = b[0] * Math.PI / 180, λ2 = b[1] * Math.PI / 180;
  const dφ = (φ2 - φ1) / 2, dλ = (λ2 - λ1) / 2;
  const δ = 2 * Math.asin(Math.sqrt(
    Math.sin(dφ) ** 2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(dλ) ** 2
  ));
  if (δ === 0) return [a, b];
  const out = [];
  for (let i = 0; i <= n; i++) {
    const f = i / n;
    const A = Math.sin((1 - f) * δ) / Math.sin(δ);
    const B = Math.sin(f * δ) / Math.sin(δ);
    const x = A * Math.cos(φ1) * Math.cos(λ1) + B * Math.cos(φ2) * Math.cos(λ2);
    const y = A * Math.cos(φ1) * Math.sin(λ1) + B * Math.cos(φ2) * Math.sin(λ2);
    const z = A * Math.sin(φ1) + B * Math.sin(φ2);
    const φ = Math.atan2(z, Math.sqrt(x * x + y * y));
    const λ = Math.atan2(y, x);
    out.push([φ * 180 / Math.PI, λ * 180 / Math.PI]);
  }
  return out;
}

function MapView({ palette, days, selected, onSelect }) {
  const mapElRef    = React.useRef(null);
  const mapRef      = React.useRef(null);
  const layerRef    = React.useRef(null);
  const onSelectRef = React.useRef(onSelect);
  onSelectRef.current = onSelect;

  const cityToDay = {};
  days.forEach((d, i) => { if (cityToDay[d.theme] == null) cityToDay[d.theme] = i; });

  // Init the map once.
  React.useEffect(() => {
    if (!mapElRef.current || mapRef.current) return;
    const L = window.L;
    if (!L) { console.warn('Leaflet not loaded'); return; }

    const map = L.map(mapElRef.current, {
      center: [44, -45],
      zoom: 3,
      zoomControl: true,
      scrollWheelZoom: false,
      doubleClickZoom: true,
      attributionControl: true,
      worldCopyJump: true,
    });
    // Fit to cover LAX → Paros (transatlantic)
    map.fitBounds([[31, -122], [54, 28]], { padding: [10, 10] });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    }).addTo(map);

    mapRef.current = map;
    return () => { map.remove(); mapRef.current = null; };
  }, []);

  // Render / re-render markers and route whenever palette or selected changes.
  React.useEffect(() => {
    const L = window.L;
    const map = mapRef.current;
    if (!L || !map) return;
    if (layerRef.current) { layerRef.current.remove(); layerRef.current = null; }
    const group = L.layerGroup().addTo(map);
    layerRef.current = group;

    // Build the route as smooth great-circle arcs between consecutive waypoints
    const routeCoords = ROUTE_ORDER
      .map(id => CITIES.find(c => c.id === id)).filter(Boolean)
      .map(c => [c.lat, c.lon]);
    const linePts = [];
    for (let i = 0; i < routeCoords.length - 1; i++) {
      const arc = gcArc(routeCoords[i], routeCoords[i + 1], 64);
      if (i === 0) linePts.push(...arc);
      else linePts.push(...arc.slice(1));
    }
    // Drop a glowing ghost line under the dashed accent line for depth
    L.polyline(linePts, {
      color: '#000', weight: 6, opacity: 0.25, lineCap: 'round',
    }).addTo(group);
    L.polyline(linePts, {
      color: palette.accent,
      weight: 2.5,
      opacity: 0.95,
      dashArray: '6 5',
      lineCap: 'round',
    }).addTo(group);

    // City markers
    CITIES.forEach(c => {
      const isActive = days[selected]?.theme === c.id || (c.id === 'lax' && days[selected]?.theme === 'transit' && selected === 0);
      const color = (PALETTES[c.id] || palette).accent;
      const isAirport = c.id === 'lax';
      const dotSize  = isAirport ? 7 : (isActive ? 11 : 9);
      const labelSize = isAirport ? 11 : (isActive ? 15 : 13);
      const html = `
        <div class="city-pin ${isActive ? 'active' : ''}" style="color:${color}; transform: translate(-50%, -50%); display:flex; flex-direction:column; align-items:center; gap:3px; pointer-events:auto;">
          <div class="dot" style="width:${dotSize}px; height:${dotSize}px; border-radius:9999px; background:${color}; ${isAirport ? `border:1.5px solid #fff;` : ''}"></div>
          <div class="label" style="font-size:${labelSize}px; padding: 1px 6px; border-radius:6px; background: rgba(8,10,14,0.78); color:${isActive ? color : '#fff'}; opacity:${isActive ? 1 : 0.95}; ${isAirport ? 'font-style:normal; font-family:\"Geist Mono\", ui-monospace, monospace; letter-spacing:0.1em;' : ''}">${c.name}</div>
        </div>`;
      const icon = L.divIcon({
        className: 'city-pin-wrap',
        html,
        iconSize: [0, 0],
        iconAnchor: [0, 0],
      });
      const m = L.marker([c.lat, c.lon], { icon }).addTo(group);
      m.on('click', () => {
        const dayIdx = c.dayIdx != null ? c.dayIdx : cityToDay[c.id];
        if (dayIdx != null) onSelectRef.current(dayIdx);
      });
    });
  }, [palette, selected, days]);

  // Invalidate size on mount in case the container was sized after Leaflet init.
  React.useEffect(() => {
    const t = setTimeout(() => mapRef.current && mapRef.current.invalidateSize(), 50);
    return () => clearTimeout(t);
  }, []);

  return (
    <div style={{
      background: palette.ink, transition: 'background 600ms ease',
      padding: 'calc(72px + env(safe-area-inset-top)) 24px 24px', height: '100%',
    }}>
      <div style={{
        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
        marginBottom: 16,
      }}>
        <div style={{
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 10, letterSpacing: '0.2em', textTransform: 'uppercase',
          color: palette.sub,
        }}>The route</div>
        <div style={{
          fontFamily: '"Geist Mono", ui-monospace, monospace',
          fontSize: 9, letterSpacing: '0.16em',
          color: palette.sub,
        }}>LAX → Paros · ~6,500 mi</div>
      </div>

      <div style={{
        position: 'relative',
        height: 360,
        borderRadius: 20, overflow: 'hidden',
        border: `1px solid ${palette.accent}33`,
      }}>
        <div ref={mapElRef} style={{ position: 'absolute', inset: 0 }}/>
        <div style={{
          position: 'absolute', inset: 0, pointerEvents: 'none',
          boxShadow: `inset 0 0 60px ${palette.ink}aa`,
        }}/>
      </div>

      {/* trip stats */}
      <div style={{
        marginTop: 22, display: 'grid', gridTemplateColumns: '1fr 1fr',
        gap: 12,
      }}>
        {[
          ['Cities', '5'],
          ['Days', String(days.length)],
          ['Flights', '5'],
          ['Hotels', '3'],
        ].map(([k,v]) => (
          <div key={k} style={{
            padding: '14px 16px',
            border: `1px solid ${palette.accent}22`, borderRadius: 14,
            background: `${palette.accent}08`,
          }}>
            <div style={{
              fontFamily: '"Geist Mono", ui-monospace, monospace',
              fontSize: 9, letterSpacing: '0.18em', textTransform: 'uppercase',
              color: palette.sub,
            }}>{k}</div>
            <div style={{
              marginTop: 4,
              fontFamily: '"Instrument Serif", Georgia, serif',
              fontSize: 28, color: palette.text, lineHeight: 1,
            }}>{v}</div>
          </div>
        ))}
      </div>
    </div>
  );
}
